name: EduStack CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO: edustack
  IMAGE_TAG: ${{ github.sha }}

permissions:
  contents: read
  security-events: write

jobs:

  # ── 1. Secret Detection ──────────────────────────────────────
  secret-scan:
    name: Secret Detection (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Snyk Dependency Scan ──────────────────────────────────
  code-scan:
    name: Dependency Scan (Snyk)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Snyk scan
        continue-on-error: true
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk test --maven-aggregate-project \
            --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  # ── 3. Maven Build ───────────────────────────────────────────
  build:
    name: Maven Build & Test
    runs-on: ubuntu-latest
    needs: code-scan
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests=false

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: EduStack-war
          path: target/*.war
          retention-days: 5

  # ── 4. Docker Build + Trivy Scan ─────────────────────────────
  docker-build:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download WAR artifact
        uses: actions/download-artifact@v4
        with:
          name: EduStack-war
          path: target/

      - name: Build Docker image
        run: |
          docker build \
            -t edustack:${{ github.sha }} \
            -f Docker-files/app/Dockerfile .

      - name: Run Trivy scan
        continue-on-error: true
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image \
            --format sarif \
            --output trivy.sarif \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            edustack:${{ github.sha }} || true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('trivy.sarif') != ''
        with:
          sarif_file: trivy.sarif

  # ── 5. Push to ECR (main branch only) ────────────────────────
  push-ecr:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
      security-events: write
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/edustack-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker build -f Docker-files/app/Dockerfile -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── 6. Deploy to EC2 ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: push-ecr
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            IMAGE_URI="${{ needs.push-ecr.outputs.image-uri }}"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS \
              --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
            docker pull $IMAGE_URI
            docker stop edustack-app 2>/dev/null || true
            docker rm edustack-app 2>/dev/null || true
            docker run -d --name edustack-app --restart always \
              -p 8080:8080 $IMAGE_URI
